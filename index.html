<style>
:root {
  --ega-bg: #07070a;
  --ega-bg-2: #0b0b10;
  --ega-ink: #efe7d4;
  --ega-ink-soft: #b8b3a4;
  --ega-ink-muted: #7a7464;
  --ega-line: rgba(212, 175, 55, 0.16);
  --ega-line-strong: rgba(212, 175, 55, 0.32);
  --ega-gold: #d4af37;
  --ega-gold-soft: #e9c66b;
  --ega-gold-deep: #a87f1c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--ega-bg); }
body {
  font-family: "Manrope", system-ui, sans-serif;
  color: var(--ega-ink);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
::selection { background: rgba(212,175,55,0.35); color: #fff; }
button { font-family: inherit; cursor: pointer; }

.ega-shell { position: relative; height: 100vh; width: 100vw; overflow: hidden; isolation: isolate; }
.ega-bg-grain {
  position: absolute; inset: 0; pointer-events: none; z-index: -2; opacity: .6;
  background-image:
    radial-gradient(rgba(212,175,55,0.04) 1px, transparent 1px),
    radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 4px 4px, 9px 9px;
  background-position: 0 0, 2px 2px;
}
.ega-bg-glow {
  position: absolute; inset: 0; pointer-events: none; z-index: -1;
  background:
    radial-gradient(60% 50% at 12% 18%, rgba(212,175,55,0.10), transparent 60%),
    radial-gradient(50% 40% at 88% 82%, rgba(168,127,28,0.08), transparent 60%),
    linear-gradient(180deg, #07070a 0%, #050507 100%);
}
.ega-layout { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
@media (max-width: 1024px) { .ega-layout { grid-template-columns: 1fr; } }

.ega-topbar {
  display: none; align-items: center; gap: 12px;
  padding: 14px 18px; border-bottom: 1px solid var(--ega-line);
  background: rgba(7,7,10,0.85); backdrop-filter: blur(14px);
  position: sticky; top: 0; z-index: 30;
}
@media (max-width: 1024px) { .ega-topbar { display: flex; } }
.ega-icon-btn {
  width: 38px; height: 38px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 10px; border: 1px solid var(--ega-line);
  background: rgba(255,255,255,0.02); color: var(--ega-ink);

}
.ega-icon-btn:hover { border-color: var(--ega-line-strong); color: var(--ega-gold-soft); }
.ega-brand-mini { display: flex; align-items: center; gap: 10px; }
.ega-brand-mark {
  font-family: "Fraunces", serif; font-weight: 600; letter-spacing: 0.18em; font-size: 14px;
  background: linear-gradient(180deg, var(--ega-gold-soft), var(--ega-gold-deep));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.ega-brand-name { font-size: 13px; color: var(--ega-ink-soft); letter-spacing: .04em; }
.ega-progress-mini { flex:1; height:2px; background: rgba(212,175,55,0.10); border-radius:2px; overflow:hidden; }
.ega-progress-mini-fill { height:100%; background: linear-gradient(90deg, var(--ega-gold-deep), var(--ega-gold-soft)); transition: width .5s ease; }

.ega-sidebar {
  height: 100vh; border-right: 1px solid var(--ega-line);
  background: linear-gradient(180deg, rgba(212,175,55,0.04), transparent 30%), rgba(7,7,10,0.6);
  backdrop-filter: blur(20px);

}
.ega-brand { padding: 28px 26px 22px; border-bottom: 1px solid var(--ega-line); position: relative; }
.ega-brand::after {
  content: ""; position: absolute; left: 26px; right: 26px; bottom: -1px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--ega-gold), transparent); opacity: .5;
}
.ega-brand-eyebrow {
  font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.32em;
  color: var(--ega-gold-deep); text-transform: uppercase;
}
.ega-brand-title {
  font-family: "Fraunces", serif; font-weight: 500; font-size: 28px; line-height: 1.05;
  margin-top: 10px; letter-spacing: -0.01em; color: var(--ega-ink);
}
.ega-brand-title em {
  font-style: italic;
  background: linear-gradient(180deg, var(--ega-gold-soft), var(--ega-gold-deep));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.ega-brand-sub { margin-top: 12px; font-size: 12.5px; color: var(--ega-ink-muted); line-height: 1.5; }
.ega-nav { flex: 1; overflow-y: auto; padding: 16px 14px 24px; scrollbar-width: thin; scrollbar-color: rgba(212,175,55,0.25) transparent; }
.ega-nav::-webkit-scrollbar { width: 6px; }
.ega-nav::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.2); border-radius: 3px; }
.ega-nav-label {

  color: var(--ega-ink-muted); padding: 6px 12px 14px; text-transform: uppercase;
}
.ega-nav-item {
  width: 100%; display: grid; grid-template-columns: 32px 1fr; align-items: center; gap: 12px;
  padding: 11px 12px; border-radius: 10px; background: transparent; border: 1px solid transparent;
  color: var(--ega-ink-soft); text-align: left;
  transition: background .25s, color .25s, border-color .25s; margin-bottom: 2px;
}
.ega-nav-item:hover { background: rgba(212,175,55,0.05); color: var(--ega-ink); }

.ega-nav-item .label { font-size: 14px; line-height: 1.3; }
.ega-nav-item.active {

}

.ega-sidebar-foot {
  padding: 18px 26px 22px; border-top: 1px solid var(--ega-line);
  font-size: 11px; color: var(--ega-ink-muted); letter-spacing: 0.04em;
  display: flex; align-items: center; justify-content: space-between;
}
.ega-sidebar-foot .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--ega-gold); box-shadow: 0 0 12px var(--ega-gold); }
@media (max-width: 1024px) {
  .ega-sidebar {
    position: fixed; inset: 0 30% 0 0; height: 100vh; z-index: 40;
    transform: translateX(-100%); transition: transform .3s ease;

}

.ega-main { position: relative; height: 100vh; display: flex; flex-direction: column; }
.ega-progress-bar { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: rgba(212,175,55,0.08); z-index: 10; }
.ega-progress-fill {

}
.ega-scroll { flex: 1; overflow-y: auto; scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: rgba(212,175,55,0.2) transparent; }
.ega-scroll::-webkit-scrollbar { width: 8px; }
.ega-scroll::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.18); border-radius: 4px; }

.ega-section { max-width: 1080px; margin: 0 auto; padding: 72px 56px 40px; animation: section-in .55s cubic-bezier(.2,.7,.2,1) both; }

@keyframes section-in { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
.ega-section-eyebrow {

}
.ega-section-eyebrow::before { content: ""; width: 36px; height: 1px; background: linear-gradient(90deg, transparent, var(--ega-gold)); }
.ega-section-title {
  font-family: "Fraunces", serif; font-weight: 400;
  font-size: clamp(34px, 4vw, 54px); line-height: 1.04; letter-spacing: -0.02em; color: #fff; margin-bottom: 18px;
}
.ega-section-title em {
  font-style: italic; font-weight: 500;
  background: linear-gradient(180deg, #f3dca0 0%, var(--ega-gold) 60%, var(--ega-gold-deep) 100%);

}
.ega-section-lead { font-size: 17px; line-height: 1.65; color: var(--ega-ink-soft); max-width: 780px; margin-bottom: 38px; }
.ega-divider { height: 1px; background: linear-gradient(90deg, transparent, var(--ega-line-strong), transparent); margin: 44px 0; }

.ega-h3 {

  letter-spacing: -0.01em; color: #fff; margin: 28px 0 14px;

}
.ega-h3-bar { width: 4px; height: 22px; background: var(--ega-gold); border-radius: 2px; box-shadow: 0 0 12px rgba(212,175,55,0.6); }
.ega-p { color: var(--ega-ink-soft); font-size: 15.5px; line-height: 1.7; margin: 0 0 14px; }
.ega-p strong { color: var(--ega-ink); font-weight: 600; }
.ega-p em { color: var(--ega-gold-soft); font-style: normal; }

.ega-callout {

}

.ega-stats { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); margin: 24px 0; }
.ega-stat {

}
.ega-stat:hover {

}
.ega-stat-value {

.ega-cards { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); margin: 22px 0; }
.ega-card {

  background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0));
  transition: all .3s; position: relative; overflow: hidden;
}
.ega-card::before {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(120% 80% at 0% 0%, rgba(212,175,55,0.10), transparent 50%);

}
.ega-card:hover { border-color: var(--ega-line-strong); transform: translateY(-3px); }
.ega-card:hover::before { opacity: 1; }
.ega-card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.ega-card-num {
  width: 32px; height: 32px; border-radius: 8px;

}
.ega-card-title { font-family: "Fraunces", serif; font-weight: 500; font-size: 18px; color: #fff; }
.ega-card-body { color: var(--ega-ink-soft); font-size: 14px; line-height: 1.6; }

.ega-steps { margin: 24px 0; }
.ega-step {
  display: grid; grid-template-columns: 56px 1fr; gap: 18px;
  padding: 20px 0; border-bottom: 1px solid var(--ega-line);
}
.ega-step:last-child { border-bottom: 0; }
.ega-step-num {

  background: linear-gradient(180deg, var(--ega-gold-soft), var(--ega-gold-deep));

}
.ega-step-title { font-family: "Fraunces", serif; font-weight: 500; color: #fff; font-size: 18.5px; margin-bottom: 6px; }
.ega-step-body { color: var(--ega-ink-soft); font-size: 14.5px; line-height: 1.65; }

.ega-table { margin: 22px 0; border: 1px solid var(--ega-line); border-radius: 14px; overflow: hidden; }
.ega-table-row { display: grid; align-items: stretch; }
.ega-table-row > div {
  padding: 14px 18px; border-right: 1px solid var(--ega-line);
  font-size: 14px; color: var(--ega-ink-soft); line-height: 1.55;
}
.ega-table-row > div:last-child { border-right: 0; }
.ega-table-row + .ega-table-row { border-top: 1px solid var(--ega-line); }
.ega-table-head > div {
  background: linear-gradient(180deg, rgba(212,175,55,0.12), rgba(212,175,55,0.04));
  color: var(--ega-gold-soft);
  font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
}

.ega-prosncons { display: grid; gap: 16px; grid-template-columns: 1fr 1fr; margin: 22px 0; }
@media (max-width: 768px) { .ega-prosncons { grid-template-columns: 1fr; } }
.ega-pc { border: 1px solid var(--ega-line); border-radius: 14px; padding: 20px 22px; background: rgba(255,255,255,0.015); }
.ega-pc-title {
  font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--ega-gold); margin-bottom: 12px;
}
.ega-pc.con .ega-pc-title { color: #c9826a; }
.ega-pc ul { list-style: none; }
.ega-pc li {

}
.ega-pc li:last-child { border-bottom: 0; }
.ega-pc li::before {

}
.ega-pc.con li::before { background: #c9826a; box-shadow: 0 0 8px rgba(201,130,106,0.4); }

.ega-vaka {
  margin: 26px 0; padding: 26px 28px; border-radius: 16px;

  border: 1px solid var(--ega-line);
}
.ega-vaka-label {
  font-family: "JetBrains Mono", monospace; font-size: 10.5px; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--ega-gold); margin-bottom: 14px;
}
.ega-vaka-title { font-family: "Fraunces", serif; font-weight: 500; font-size: 22px; color: #fff; margin-bottom: 14px; }
.ega-vaka-grid { display: grid; gap: 18px; grid-template-columns: repeat(3, 1fr); }

.ega-vaka-col h5 {

.ega-takeaways {

  background: linear-gradient(180deg, rgba(212,175,55,0.06), rgba(212,175,55,0.01));

}

.ega-hero-title {
  font-family: "Fraunces", serif; font-weight: 300;

.ega-hero-title em {
  font-style: italic; font-weight: 400;
  background: linear-gradient(180deg, #f3dca0 0%, var(--ega-gold) 50%, var(--ega-gold-deep) 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;

.ega-hero-meta {

}
.ega-hero-meta span strong { color: var(--ega-gold-soft); font-weight: 500; }
.ega-hero-rule { height: 1px; background: linear-gradient(90deg, transparent, var(--ega-line-strong), transparent); margin: 44px 0; }
.ega-toc { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); margin-top: 12px; }
.ega-toc-item {

  <div class="ega-bg-grain"></div>
  <div class="ega-bg-glow"></div>

    <button class="ega-icon-btn" id="menuToggle" aria-label="Menü">☰</button>

/* ============ Render ============ */
const esc = (s) => String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

function renderBlock(b) {
  if (b.type === "h") return `<h3 class="ega-h3"><span class="ega-h3-bar"></span>${esc(b.text)}</h3>`;
  if (b.type === "p") return `<p class="ega-p">${b.text}</p>`;
  if (b.type === "callout") return `
    <div class="ega-callout">
      ${b.title ? `<div class="ega-callout-title">${esc(b.title)}</div>` : ""}
      <div class="ega-callout-body">${b.text}</div>
    </div>`;
  if (b.type === "stats") return `
    <div class="ega-stats">
      ${b.items.map(it => `
        <div class="ega-stat">
          <div class="ega-stat-value">${esc(it.value)}</div>
          <div class="ega-stat-label">${esc(it.label)}</div>
        </div>`).join("")}
    </div>`;
  if (b.type === "cards") return `
    <div class="ega-cards">
      ${b.items.map((c, i) => `
        <div class="ega-card">
          <div class="ega-card-head">
            <span class="ega-card-num">${String(i+1).padStart(2,"0")}</span>
            <span class="ega-card-title">${esc(c.title)}</span>
          </div>
          <div class="ega-card-body">${esc(c.body)}</div>
        </div>`).join("")}
    </div>`;
  if (b.type === "steps") return `
    <div class="ega-steps">
      ${b.items.map((s, i) => `
        <div class="ega-step">
          <div class="ega-step-num">${String(i+1).padStart(2,"0")}</div>
          <div>
            <div class="ega-step-title">${esc(s.title)}</div>
            <div class="ega-step-body">${esc(s.body)}</div>
          </div>
        </div>`).join("")}
    </div>`;
  if (b.type === "table") {
    const cols = b.headers.length;
    const style = `grid-template-columns: repeat(${cols}, minmax(0,1fr));`;
    return `
    <div class="ega-table">
      <div class="ega-table-row ega-table-head" style="${style}">
        ${b.headers.map(h => `<div>${esc(h)}</div>`).join("")}
      </div>
      ${b.rows.map(row => `
        <div class="ega-table-row" style="${style}">
          ${row.map(c => `<div>${esc(c)}</div>`).join("")}
        </div>`).join("")}
    </div>`;
  }
  if (b.type === "proscons") return `
    <div class="ega-prosncons">
      <div class="ega-pc">
        <div class="ega-pc-title">Avantajlar</div>
        <ul>${b.pros.map(p => `<li>${esc(p)}</li>`).join("")}</ul>
      </div>
      <div class="ega-pc con">
        <div class="ega-pc-title">Riskler</div>
        <ul>${b.cons.map(p => `<li>${esc(p)}</li>`).join("")}</ul>
      </div>
    </div>`;
  if (b.type === "vaka") return `
    <div class="ega-vaka">
      <div class="ega-vaka-label">Örnek Vaka</div>
      <div class="ega-vaka-title">${esc(b.title)}</div>
      <div class="ega-vaka-grid">
        <div class="ega-vaka-col"><h5>Bağlam</h5><p>${esc(b.baglam)}</p></div>
        <div class="ega-vaka-col"><h5>Analiz</h5><p>${esc(b.analiz)}</p></div>
        <div class="ega-vaka-col"><h5>Sonuç</h5><p>${esc(b.sonuc)}</p></div>
      </div>
    </div>`;
  if (b.type === "takeaways") return `
    <div class="ega-takeaways">
      <h4><span class="ega-h3-bar"></span>Temel Çıkarımlar</h4>
      <ol>${b.items.map(t => `<li>${esc(t)}</li>`).join("")}</ol>
    </div>`;
  return "";
}

function renderHero(s) {
  return `
    <section class="ega-hero">
      <div class="ega-hero-mark">Ek Gelir Akademi · Premium Edisyon</div>
      <h1 class="ega-hero-title">Dijital Pazarlama <em>Stratejisi</em></h1>
      <p class="ega-hero-sub">Geleneksel reklamcılığın yerini hassas hedefleme, ölçülebilir kampanyalar ve veriyle büyüyen markalar aldı. Bu 8 bölümlük sunum; dijital pazarlamanın temellerinden SEO'ya, sosyal medyadan analitiğe kadar markanızın çevrimiçi varlığını profesyonel düzeye taşımak için tasarlandı.</p>
      <div class="ega-hero-meta">
        <span><strong>8</strong> Bölüm</span>
        <span><strong>Premium</strong> Sunum Edisyonu</span>
        <span><strong>2026</strong> Türkiye Sürümü</span>
      </div>
      <div class="ega-hero-rule"></div>
      <h3 class="ega-h3"><span class="ega-h3-bar"></span>İçindekiler</h3>
      <div class="ega-toc">
        ${s.toc.map((t, i) => `
          <button class="ega-toc-item" data-jump="${i+1}">
            <span class="ega-toc-num">${String(i+1).padStart(2,"0")}</span>
            <span class="ega-toc-label">${esc(t)}</span>
          </button>`).join("")}
      </div>
    </section>`;
}

function renderSection(s, idx) {
  if (s.hero) return renderHero(s);
  return `
    <section class="ega-section">
      <div class="ega-section-eyebrow">Bölüm ${String(idx).padStart(2,"0")} · Ek Gelir Akademi</div>
      <h2 class="ega-section-title">${s.title}</h2>
      ${s.lead ? `<p class="ega-section-lead">${esc(s.lead)}</p>` : ""}
      ${(s.blocks || []).map(renderBlock).join("")}
    </section>`;
}

/* ============ State + Events ============ */
const state = { activeIndex: 0 };
const $nav = document.getElementById("nav");
const $container = document.getElementById("sectionContainer");
const $scroll = document.getElementById("scroll");
const $progress = document.getElementById("progressFill");
const $progressMini = document.getElementById("progressMini");
const $prev = document.getElementById("prevBtn");
const $next = document.getElementById("nextBtn");
const $prevLabel = document.getElementById("prevLabel");
const $nextLabel = document.getElementById("nextLabel");
const $count = document.getElementById("pagerCount");
const $sidebar = document.getElementById("sidebar");
const $menuToggle = document.getElementById("menuToggle");

// Build sidebar
SECTIONS.forEach((s, i) => {
  const btn = document.createElement("button");
  btn.className = "ega-nav-item";
  btn.dataset.idx = i;
  btn.innerHTML = `<span class="num">${String(i+1).padStart(2,"0")}</span><span class="label">${esc(s.shortTitle)}</span>`;
  btn.addEventListener("click", () => { setActive(i); $sidebar.classList.remove("open"); });
  $nav.appendChild(btn);
});

function setActive(i) {
  if (i < 0 || i >= SECTIONS.length) return;
  state.activeIndex = i;
  $container.innerHTML = renderSection(SECTIONS[i], i);
  // Attach TOC click handlers if hero
  $container.querySelectorAll(".ega-toc-item").forEach(el => {
    el.addEventListener("click", () => setActive(parseInt(el.dataset.jump, 10)));
  });
  // Update sidebar active
  document.querySelectorAll(".ega-nav-item").forEach((el, idx) => {
    el.classList.toggle("active", idx === i);
  });
  // Progress
  const pct = ((i + 1) / SECTIONS.length) * 100;
  $progress.style.width = pct + "%";
  if ($progressMini) $progressMini.style.width = pct + "%";
  // Pager
  $prev.disabled = (i === 0);
  $next.disabled = (i === SECTIONS.length - 1);
  $prevLabel.textContent = i > 0 ? SECTIONS[i - 1].shortTitle : "Başlangıç";
  $nextLabel.textContent = i < SECTIONS.length - 1 ? SECTIONS[i + 1].shortTitle : "Son bölüm";
  $count.textContent = `${String(i+1).padStart(2,"0")} / ${String(SECTIONS.length).padStart(2,"0")}`;
  // Scroll top
  $scroll.scrollTo({ top: 0, behavior: "smooth" });
}

$prev.addEventListener("click", () => setActive(state.activeIndex - 1));
$next.addEventListener("click", () => setActive(state.activeIndex + 1));
if ($menuToggle) $menuToggle.addEventListener("click", () => $sidebar.classList.toggle("open"));

// Keyboard navigation
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") setActive(state.activeIndex + 1);
  if (e.key === "ArrowLeft") setActive(state.activeIndex - 1);
});

// Boot
setActive(0);
</script>
</body>
